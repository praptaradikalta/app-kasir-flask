<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kasir UKM{% endblock %}</title>

    <!-- 1. Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Bootstrap CSS (WAJIB TETAP ADA JIKA MASIH PAKAI MODAL BOOTSTRAP) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- 3. FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Tetap simpan ini agar konten tidak tertutup navbar bawah */
        body { padding-bottom: 90px; }
        
        /* Hilangkan gaya .nav-link lama karena sudah diganti class Tailwind */
    </style>
</head>
<body class="bg-gray-50"> <!-- Gunakan utilitas Tailwind untuk background bodi -->

    <!-- Container Utama: Tambahkan mx-auto agar ke tengah di desktop -->
    <div class="container mx-auto mt-6 px-4">
        {% block content %}{% endblock %}
    </div>

    <!-- Navbar Bottom Tailwind -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] px-2 py-3 z-50">
        <div class="flex justify-around items-center max-w-lg mx-auto">
            <a href="{{ url_for('penjualan.index_kasir') }}" class="flex flex-col items-center text-gray-400 hover:text-indigo-600 transition group">
                <i class="fas fa-shopping-cart text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Order</span>
            </a>
            <a href="{{ url_for('user.dashboard') }}" class="flex flex-col items-center text-indigo-600">
                <i class="fas fa-th-large text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Dashboard</span>
            </a>
            <a href="{{ url_for('produk.list_produk') }}" class="flex flex-col items-center text-gray-400 hover:text-indigo-600 transition">
                <i class="fas fa-box text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Produk</span>
            </a>
            <a href="{{ url_for('penjualan.riwayat_penjualan') }}" class="text-center text-decoration-none {% if request.endpoint == 'penjualan.riwayat_penjualan' %}text-primary fw-bold{% else %}text-muted{% endif %}">
                <i class="bi bi-receipt d-block fs-4"></i>
                <small>Riwayat</small>
            </a>
        </div>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
