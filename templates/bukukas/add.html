{% extends "base.html" %}

{% block title %}Catat Kas - Kasir UKM{% endblock %}

{% block content %}
<div class="mb-4">
    <h2 class="fw-bold mb-0">Catat Kas Manual</h2>
    <p class="text-muted mb-0">Untuk pemasukan/pengeluaran di luar transaksi penjualan (contoh: belanja bahan baku, setoran modal, dll).</p>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Jenis</label>
                <div class="d-flex gap-2">
                    <label class="btn btn-outline-success flex-fill">
                        <input type="radio" name="jenis" value="masuk" class="d-none" checked> Kas Masuk
                    </label>
                    <label class="btn btn-outline-danger flex-fill">
                        <input type="radio" name="jenis" value="keluar" class="d-none"> Kas Keluar
                    </label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Keterangan</label>
                <input type="text" name="keterangan" class="form-control" placeholder="Contoh: Belanja bahan baku di Pasar" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Jumlah (Rp)</label>
                <input type="number" name="jumlah" class="form-control" min="1" placeholder="0" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">Simpan</button>
                <a href="{{ url_for('bukukas.bukukas_list') }}" class="btn btn-outline-secondary px-4">Batal</a>
            </div>
        </form>
    </div>
</div>

<script>
// Highlight tombol radio yang dipilih
document.querySelectorAll('input[name="jenis"]').forEach(radio => {
    radio.addEventListener('change', () => {
        document.querySelectorAll('input[name="jenis"]').forEach(r => {
            r.closest('label').classList.remove('btn-success', 'btn-danger');
            r.closest('label').classList.add(r.value === 'masuk' ? 'btn-outline-success' : 'btn-outline-danger');
        });
        const checked = document.querySelector('input[name="jenis"]:checked');
        checked.closest('label').classList.remove('btn-outline-success', 'btn-outline-danger');
        checked.closest('label').classList.add(checked.value === 'masuk' ? 'btn-success' : 'btn-danger');
    });
});
</script>
{% endblock %}
