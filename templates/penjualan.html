<!-- templates/penjualan.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KasirPro - Penjualan</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/penjualan.css') }}" />
</head>
<body>
  <header class="mobile-nav">Penjualan</header>

  <main>
    <section>
      <h2>Input Penjualan Aktif</h2>
      <form id="salesForm" method="POST" action="{{ url_for('input_penjualan') }}">
        <label for="total">Total Bayar</label>
        <input type="number" id="total" name="total" min="0" required />

        <button type="submit">Simpan Penjualan</button>
      </form>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('produk.produk_list') }}">Produk</a>
    <a href="{{ url_for('penjualan') }}" class="active">Penjualan</a>
    <a href="{{ url_for('laporan') }}">Laporan</a>
    <a href="{{ url_for('pengaturan') }}">Pengaturan</a>
  </nav>
  <script src="{{ url_for('static', filename='js/menu.js') }}"></script>

</body>
</html>
