{% extends 'base.html' %}

{% block title %}Daftar Penjualan - Kasir MBL{% endblock %}

{% block content %}
<div class="container">
  <h2>Daftar Penjualan</h2>
  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Tanggal</th>
        <th>User</th>
        <th>Meja</th>
        <th>Total Bayar</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      {% for p in penjualan %}
      <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
        <td>{{ p[3] }}</td>
        <td>Rp {{ p[6] }}</td>
        <td>{{ p[9] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
