{% extends 'base.html' %} 

{% block title %}Tambah Produk - Kasir UKM{% endblock %}

{% block content %}
<!-- HEADER -->
<div class="mb-8">
    <a href="{{ url_for('produk.list_produk') }}" class="text-indigo-600 hover:text-indigo-800 flex items-center gap-2 mb-2 transition">
        <i class="fas fa-arrow-left text-sm"></i>
        <span class="font-medium text-sm">Kembali ke Daftar</span>
    </a>
    <h1 class="text-3xl font-bold text-gray-800">Tambah Produk Baru</h1>
    <p class="text-gray-500 text-sm">Lengkapi formulir di bawah untuk menambah stok produk.</p>
</div>

<main class="max-w-4xl mx-auto">
    <form method="POST" action="{{ url_for('produk.tambah_produk') }}" enctype="multipart/form-data" 
          class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
        
        <div class="p-8">
            <!-- GRID LAYOUT -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                
                <!-- KOLOM KIRI: Informasi Utama -->
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Produk</label>
                        <input type="text" name="nama_produk" required placeholder="Contoh: Kopi Susu Aren"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Kategori</label>
                        <select name="kategori" required
                                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all appearance-none bg-no-repeat bg-right pr-10"
                                style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%236b7280%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C/polyline%3E%3C/svg%3E');">
                            {% for kategori in kategoris %}
                            <option value="{{ kategori }}" {% if produk and produk.kategori == kategori %}selected{% endif %}>
                                {{ kategori }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Harga Beli</label>
                            <input type="number" name="harga_beli" min="0" required
                                   class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Harga Jual</label>
                            <input type="number" name="harga_jual" min="0" required
                                   class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-bold text-indigo-600">
                        </div>
                    </div>
                </div>

                <!-- KOLOM KANAN: Stok & Gambar -->
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Jumlah Stok</label>
                        <input type="number" name="stok" min="0" step="1" required value="0"
                               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                    </div>

                    <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                        <input type="checkbox" name="is_konsinyasi" value="1" id="konsinyasi"
                               class="w-5 h-5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <label for="konsinyasi" class="text-sm font-medium text-gray-700">Produk Konsinyasi (Titipan)</label>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Foto Produk</label>
                        <div class="relative group cursor-pointer">
                            <input type="file" id="gambar" name="gambar" accept="image/*"
                                   class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                            <div class="border-2 border-dashed border-gray-200 rounded-2xl p-6 text-center group-hover:border-indigo-400 transition-all bg-gray-50">
                                <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2 group-hover:text-indigo-500 transition-colors"></i>
                                <p class="text-xs text-gray-500">Klik atau seret gambar ke sini</p>
                            </div>
                        </div>
                        <img id="preview-gambar" class="mt-4 rounded-2xl shadow-sm border border-gray-100 max-h-48 mx-auto" style="display:none;">
                    </div>
                </div>

            </div>
        </div>

        <!-- FOOTER FORM (Action Button) -->
        <div class="bg-gray-50 px-8 py-6 border-t border-gray-100 flex justify-end">
            <button type="submit" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-3 rounded-xl font-bold transition-all shadow-md hover:shadow-indigo-200 active:scale-95">
                Simpan Produk
            </button>
        </div>

    </form>
</main>

<script>
  document.getElementById('gambar').onchange = e => {
    const file = e.target.files;
    if (file) {
      document.getElementById('preview-gambar').src = URL.createObjectURL(file);
      document.getElementById('preview-gambar').style.display = 'block';
    }
  };
</script>
{% endblock %}
