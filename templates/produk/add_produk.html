{% extends 'base.html' %} 
{% block content %}
<header class="mobile-nav">Tambah Produk</header>
<main>
  <section class="card">
    <div class="form-container">
      <h3>Masukan Data Produk Baru</h3>
      <form method="POST" action="{{ url_for('produk.tambah_produk') }}" enctype="multipart/form-data">
        <div class="form-grid">
          <div class="form-group">
            <label for="nama_produk">Nama Produk</label>
            <input type="text" id="nama_produk" name="nama_produk" required>

            <label for="kategori">Kategori</label>
            <select id="kategori" name="kategori" required>
              {% for kategori in kategoris %}
              <option value"{{ kategori }}" {% if produk and produk.kategori == kategori %}selected{% endif %}>
                {{ kategori }}
              </option>
              {% endfor %}
            </select>

            <label for="harga_beli">Harga Beli</label>
            <input type="number" id="harga_beli" name="harga_beli" min="0" required>

            <label for="harga_jual">Harga Jual</label>
            <input type="number" id="harga_jual" name="harga_jual" min="0" required>

            <label for="stok">Stok</label>
            <input type="number" id="stok" name="stok" min="0" step="1" required value="0">

            <label>
              <input type="checkbox" name="is_konsinyasi" value="1"> Konsinyasi (Titip)
            </label>

            <label for="gambar">Foto Produk</label>
            <input type="file" id="gambar" name="gambar" accept="image/*">
            <img id="preview-gambar" style="max-width:150px; margin-top:8px; display:none;">

            <button type="submit" class="btn-primary">Tambah Produk</button>
          </div>
        </div>
      </form>
    </div>
  </section>
</main>
<nav class="bottom-nav">
  <a href="{{ url_for('dashboard') }}">Dashboard</a>
  <a href="{{ url_for('produk.produk_list') }}" class="active">Produk</a>
  <a href="{{ url_for('penjualan') }}">Penjualan</a>
  <a href="{{ url_for('laporan') }}">Laporan</a>
  <a href="{{ url_for('pengaturan') }}">Pengaturan</a>
</nav>
<script>
  document.getElementById('gambar').onchange = e => {
    const file = e.target.files[0];
    if (file) {
      document.getElementById('preview-gambar').src = URL.createObjectURL(file);
      document.getElementById('preview-gambar').style.display = 'block';
    }
  };
</script>
{% endblock %}
