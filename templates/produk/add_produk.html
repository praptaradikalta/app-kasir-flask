{% extends 'base.html' %}
{% block content %}

<header class="mobile-nav">Produk</header>
<main>
  
  <section class="card">
    <div class="form-container">
      <h3>Tambah Produk Baru</h3>
        <form method="POST" action="{{ url_for('produk.produk_list') }}">
         <div class="form-grid"> 
            <div class="form-group">    
            <label for="nama_produk">Nama Produk</label>
            <input type="text" id="nama_produk" name="nama_produk" required
                    value="{{ produk.nama_produk if produk is defined and produk else '' }}">

            <label for="kategori">Kategori</label>
            <select id="kategori" name="kategori" required>
                {% for kategori in kategoris %}
                <option value="{{ kategori }}"
                    {% if produk is defined and produk and produk.kategori == kategori %}selected{% endif %}>
                    {{ kategori }}
                </option>
                {% endfor %}
            </select>

            <label for="harga_beli">Harga Beli</label>
            <input type="number" id="harga_beli" name="harga_beli" min="0" required
                    value="{{ produk.harga_beli if produk is defined and produk else '' }}">

            <label for="harga_jual">Harga Jual</label>
            <input type="number" id="harga_jual" name="harga_jual" min="0" required
                    value="{{ produk.harga_jual if produk is defined and produk else '' }}">

            <label for="stok">Stok</label>
            <input type="number" id="stok" name="stok" min="0" step="1" required
                    value="{{ stok if stok is defined else 0 }}">

            <label>
                <input type="checkbox" name="is_konsinyasi" value="1"
                {% if produk is defined and produk and produk.is_konsinyasi %}checked{% endif %}>
                Konsinyasi (Titip)
            </label>

            <button type="submit" class="btn-primary">Tambah Produk</button> 
            </div>
         </div>   
        </form>

    </div>
  </section>
</main>
<nav class="bottom-nav">
  <a href="{{ url_for('dashboard') }}">Dashboard</a>
  <a href="{{ url_for('produk.produk_list') }}" class="active">Produk</a>
  <a href="{{ url_for('penjualan') }}">Penjualan</a>
  <a href="{{ url_for('laporan') }}">Laporan</a>
  <a href="{{ url_for('pengaturan') }}">Pengaturan</a>
</nav>
<script>
  document.getElementById('konsinyasiSelect').addEventListener('change', function() {
    document.getElementById('hargaTitipGroup').style.display = this.value === '1' ? 'block' : 'none';
  });
</script>
<script src="{{ url_for('static', filename='js/menu.js') }}"></script>
{% endblock %}
