{% extends 'base.html' %}
{% block content %}
<header class="mobile-nav">Edit Produk</header>
<main>
  <section>
    <div class="produk-header">
      <h2>Edit Produk</h2>
    </div>
    <form method="POST" enctype="multipart/form-data">
      <div class="form-group">
        <label for="nama_produk">Nama Produk</label>
        <input type="text" id="nama_produk" name="nama_produk" value="{{ produk.nama_produk }}" required>
      </div>
      <div class="form-group">
        <label for="kategori">Kategori</label>
        <select id="kategori" name="kategori" required>
          {% for kategori in kategoris %}
          <option value="{{ kategori }}" {% if produk.kategori == kategori %}selected{% endif %}>{{ kategori }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="harga_beli">Harga Beli</label>
        <input type="number" id="harga_beli" name="harga_beli" value="{{ produk.harga_beli }}" min="0" required>
      </div>
      <div class="form-group">
        <label for="harga_jual">Harga Jual</label>
        <input type="number" id="harga_jual" name="harga_jual" value="{{ produk.harga_jual }}" min="0" required>
      </div>
      <div class="form-group">
        <label for="stok">Stok</label>
        <input type="number" name="stok" id="stok" min="0" step="1" value="{{ stok }}" required>
      </div>
      <div class="form-group">
        <label for="gambar">Gambar Produk</label>
        <input type="file" name="gambar" id="gambar" accept="image/*">
        {% if produk.gambar %}
        <div>
          <img src="{{ produk.gambar }}" style="width:100px;height:100px;">
          <p>Gambar saat ini</p>
        </div>
        {% endif %}
      </div>
      <div class="form-group">
        <button type="submit" class="btn btn-update">Update Produk</button>
      </div>
    </form>
  </section>
</main>
{% endblock %}
