<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Kasir UKM</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
  <div class="wrapper">
    <div class="logo-title">BUAT PASSWORD BARU</div>

    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <p style="font-size: 0.85rem; padding: 10px; border-radius: 8px; margin-bottom: 12px;
                      background: {{ '#fdecea' if category == 'danger' else '#e8f4fd' }};
                      color: {{ '#c0392b' if category == 'danger' else '#2980b9' }};">
              {{ message }}
            </p>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <label>Password Baru</label>
        <div class="password-box">
          <input type="password" name="password" id="password" placeholder="Minimal 6 karakter" required minlength="6">
          <span class="toggle-eye" onclick="togglePassword('password')">👁️</span>
        </div>

        <label>Konfirmasi Password Baru</label>
        <div class="password-box">
          <input type="password" name="konfirmasi_password" id="konfirmasi" placeholder="Ulangi password baru" required minlength="6">
          <span class="toggle-eye" onclick="togglePassword('konfirmasi')">👁️</span>
        </div>

        <button type="submit">SIMPAN PASSWORD BARU</button>
        <a href="{{ url_for('user.login') }}">&larr; Kembali ke Login</a>
      </form>
    </div>
  </div>

  <script>
    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
